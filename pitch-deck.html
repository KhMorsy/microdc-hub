<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroDC Hub — Pitch Deck (Acts 1–3, for Loom)</title>
<style>
  :root { --bg:#0d0a07; --orange:#e8742c; --text:#f0e9e2; --dim:#a89b8c; --line:#33271b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#000; color:var(--text);
    font-family:"Helvetica Neue",Arial,sans-serif; overflow:hidden; }

  .stage { position:fixed; inset:0; background:#000; }

  .slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    overflow:hidden; opacity:0; visibility:hidden; transition:opacity .6s ease; background:#000; }
  .slide.active { opacity:1; visibility:visible; z-index:2; }

  .slide img { max-width:100%; max-height:100%; object-fit:contain; transform-origin:center center;
    will-change:transform; }

  /* Ken Burns motion — re-triggered when a slide becomes active */
  .slide.active .kb-zoom-in   { animation:zoomIn   20s ease-out forwards; }
  .slide.active .kb-zoom-out  { animation:zoomOut  20s ease-out forwards; }
  .slide.active .kb-pan-right { animation:panRight 20s ease-out forwards; }
  .slide.active .kb-hold-zoom { animation:holdZoom 20s ease-out forwards; }

  @keyframes zoomIn   { from{ transform:scale(1.0);} to{ transform:scale(1.14);} }
  @keyframes zoomOut  { from{ transform:scale(1.14);} to{ transform:scale(1.0);} }
  @keyframes panRight { from{ transform:scale(1.12) translateX(-3.5%);} to{ transform:scale(1.12) translateX(3.5%);} }
  @keyframes holdZoom { from{ transform:scale(1.02);} to{ transform:scale(1.09);} }

  /* Caption / teleprompter bar (toggle: C) */
  .caption { position:fixed; left:0; right:0; bottom:0; z-index:5;
    padding:26px 8vw 34px; background:linear-gradient(to top, rgba(0,0,0,.92) 30%, rgba(0,0,0,0));
    transition:opacity .3s ease; }
  .caption .beat { color:var(--orange); font-size:.8rem; letter-spacing:.18em; text-transform:uppercase;
    margin-bottom:.5rem; }
  .caption .vo { font-size:1.35rem; line-height:1.5; max-width:60rem; }
  body.no-cap .caption { opacity:0; pointer-events:none; }

  /* Top info chip (toggle: I) */
  .chip { position:fixed; top:18px; left:22px; z-index:5; color:var(--dim); font-size:.85rem;
    letter-spacing:.05em; transition:opacity .3s ease; }
  .chip b { color:var(--orange); }
  body.no-chip .chip { opacity:0; }

  /* Progress dots */
  .dots { position:fixed; top:20px; right:22px; z-index:5; display:flex; gap:8px; transition:opacity .3s ease; }
  .dots span { width:9px; height:9px; border-radius:50%; background:#3a2e20; transition:background .3s; }
  .dots span.on { background:var(--orange); }
  body.no-chip .dots { opacity:0; }

  /* Help hint */
  .hint { position:fixed; bottom:14px; right:18px; z-index:6; color:var(--dim); font-size:.78rem;
    background:rgba(0,0,0,.5); padding:6px 10px; border-radius:6px; border:1px solid var(--line);
    transition:opacity .5s ease; }
  body.hide-hint .hint { opacity:0; }

  /* Nav arrows */
  .nav { position:fixed; top:50%; transform:translateY(-50%); z-index:5; cursor:pointer;
    color:rgba(240,233,226,.35); font-size:2.4rem; user-select:none; padding:0 16px; transition:color .2s; }
  .nav:hover { color:var(--orange); }
  .nav.prev { left:6px; } .nav.next { right:6px; }
  body.no-chip .nav { opacity:0; pointer-events:none; }
</style>
</head>
<body class="no-cap no-chip">
<div class="stage" id="stage"></div>

<div class="chip"><b id="actLabel"></b> &nbsp;·&nbsp; <span id="tcLabel"></span></div>
<div class="dots" id="dots"></div>
<div class="caption"><div class="beat" id="beat"></div><div class="vo" id="vo"></div></div>

<div class="nav prev" onclick="go(-1)">‹</div>
<div class="nav next" onclick="go(1)">›</div>

<div class="hint" id="hint">← / → or click to navigate &nbsp;·&nbsp; C captions &nbsp;·&nbsp; I chrome &nbsp;·&nbsp; P autoplay &nbsp;·&nbsp; F fullscreen</div>

<script>
const SLIDES = [
  { img:"assets/video/01-the-wall.png", motion:"kb-zoom-in", act:"Act 1 · The Problem",
    beat:"Cold open — the wall", tc:"0:00–0:15", dur:15,
    vo:"Every new AI model needs a new data center. But the data center can't get built — not because of chips, but because of power. In half of Europe, the grid is full. The answer today is: wait five, seven years for a connection. That's the wall the whole industry just hit." },
  { img:"assets/video/02-distributed-opportunity.png", motion:"kb-zoom-in", act:"Act 1 · The Problem",
    beat:"Reframe — the capacity is distributed", tc:"0:15–0:35", dur:20,
    vo:"But here's what everyone's missing. While the big grid is congested, millions of small sites are sitting on surplus clean power they can't sell, and heat demand they pay to cover. The capacity isn't gone. It's just distributed — scattered across prosumers and small businesses who have no way to use it for compute." },
  { img:"assets/video/03-three-failures.png", motion:"kb-pan-right", act:"Act 1 · The Problem",
    beat:"The three failures", tc:"0:35–0:50", dur:15,
    vo:"So we get three failures at once. Grid bottlenecks block new builds. Clean power and its certificate value go to waste. And rigid, always-on data centers can't flex to match when energy is cheap and green. Three problems — or, if you flip them, one opportunity." },
  { img:"assets/video/04-democratize.png", motion:"kb-pan-right", act:"Act 2 · The Big Idea",
    beat:"Vision — democratize the data center", tc:"0:50–1:05", dur:15,
    vo:"Our idea is to democratize the data center. Instead of one giant facility waiting on one giant grid connection, picture a network of micro data centers — five kilowatts on a rooftop, fifty in a workshop — built exactly where the spare clean power already is." },
  { img:"assets/video/07-nvidia-span-hardware.png", motion:"kb-hold-zoom", act:"Act 2 · The Big Idea",
    beat:"Hardware proof — NVIDIA × SPAN", tc:"1:05–1:20", dur:15,
    vo:"This isn't science fiction. NVIDIA is already building the in-home mini data center — sixteen GPUs in a box the size of a fridge, powered by surplus electricity from your home, managed through SPAN's smart panel. The hardware layer exists. What's missing is the intelligence to scale it: where to put the next unit, and how to run it so the owner actually earns. That's MicroDC Hub." },
  { img:"assets/video/05-shared-society.png", motion:"kb-zoom-in", act:"Act 2 · The Big Idea",
    beat:"The society of shared compute", tc:"1:20–1:35", dur:15,
    vo:"MicroDC Hub turns every prosumer site into a node in a shared compute economy. Households sell compute, not just power — and earn real revenue in euros. Medium operators can run whole networks of these units and serve AI labs directly. The energy factory of the last century made electricity. These new factories make compute — and we let everyone own a piece." },
  { img:"assets/video/08-two-questions.png", motion:"kb-zoom-out", act:"Act 3 · The Solution",
    beat:"Two questions — SiteScore + EarnMax", tc:"1:35–1:55", dur:20,
    vo:"To make that real, an owner needs two answers — and MicroDC Hub gives both. SiteScore is a one-time report that tells you exactly where to build, down to the postal code. EarnMax is a yearly subscription that tells you how to run it — turning the node into a grid asset that earns. Instead of showing you slides, let me show you the product." },
];

const stage = document.getElementById("stage");
const dotsEl = document.getElementById("dots");
SLIDES.forEach((s, i) => {
  const d = document.createElement("div");
  d.className = "slide"; d.dataset.i = i;
  const img = document.createElement("img");
  img.src = s.img; img.className = s.motion; img.alt = s.beat;
  d.appendChild(img); stage.appendChild(d);
  const dot = document.createElement("span"); dotsEl.appendChild(dot);
});
const slideEls = [...document.querySelectorAll(".slide")];
const dotEls = [...dotsEl.children];
let cur = 0, autoplay = false, timer = null;

function render() {
  slideEls.forEach((el, i) => {
    const wasActive = el.classList.contains("active");
    el.classList.toggle("active", i === cur);
    if (i === cur) {
      const img = el.querySelector("img");
      img.style.animation = "none"; void img.offsetWidth; img.style.animation = "";
    }
  });
  dotEls.forEach((d, i) => d.classList.toggle("on", i === cur));
  const s = SLIDES[cur];
  document.getElementById("actLabel").textContent = s.act;
  document.getElementById("tcLabel").textContent = s.tc;
  document.getElementById("beat").textContent = s.beat;
  document.getElementById("vo").textContent = s.vo;
}
function go(dir) {
  const n = cur + dir;
  if (n < 0 || n >= SLIDES.length) { if (autoplay) stopAuto(); return; }
  cur = n; render(); if (autoplay) scheduleNext();
}
function scheduleNext() {
  clearTimeout(timer);
  timer = setTimeout(() => go(1), SLIDES[cur].dur * 1000);
}
function startAuto() { autoplay = true; document.body.classList.add("hide-hint"); scheduleNext(); }
function stopAuto() { autoplay = false; clearTimeout(timer); }

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); stopAuto(); go(1); }
  else if (e.key === "ArrowLeft") { stopAuto(); go(-1); }
  else if (e.key.toLowerCase() === "c") document.body.classList.toggle("no-cap");
  else if (e.key.toLowerCase() === "i") document.body.classList.toggle("no-chip");
  else if (e.key.toLowerCase() === "p") { autoplay ? stopAuto() : startAuto(); }
  else if (e.key.toLowerCase() === "f") {
    document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
  }
});
stage.addEventListener("click", () => { stopAuto(); go(1); });
setTimeout(() => document.body.classList.add("hide-hint"), 5000);
render();
</script>
</body>
</html>
