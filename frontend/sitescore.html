<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>SiteScore · Bavaria</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#E0703C; --ink:#222; --muted:#717171; --line:#EBEBEB; --good:#639922; --mid:#EF9F27; --bad:#E24B4A; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#fff; color:var(--ink);
    font-family:"Manrope",-apple-system,system-ui,sans-serif; }
  .wrap{ max-width:1320px; height:100vh; margin:0 auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
  header{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .logo{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:18px; }
  .logo svg{ width:24px; height:24px; }
  header .sub{ color:var(--muted); font-size:13px; font-weight:600; }
  header .spacer{ flex:1; }
  .badge{ background:#fff4ee; color:var(--accent); font-weight:800; padding:4px 10px; border-radius:999px; border:1px solid #f3d9cc; font-size:12px; }
  .btn{ background:#fff; border:1px solid var(--line); border-radius:999px; padding:6px 12px; font:inherit; font-size:12px; font-weight:700; color:var(--ink); cursor:pointer; }
  .btn:hover{ background:#f3f3f3; }
  a.link{ color:var(--accent); font-weight:700; cursor:pointer; font-size:12px; }
  #dataFile{ display:none; }
  .controls{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .caps{ display:flex; gap:6px; flex-wrap:wrap; }
  .cap{ border:1px solid var(--line); background:#fff; border-radius:999px; padding:7px 12px; font:inherit; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; }
  .cap.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .cap small{ font-weight:500; opacity:.7; }
  .search{ display:flex; gap:8px; align-items:center; }
  .search input{ font:inherit; font-size:14px; padding:8px 14px; border:1px solid var(--line); border-radius:999px; width:200px; outline:none; }
  .search input:focus{ border-color:var(--accent); }
  .search .res{ font-size:12px; color:var(--muted); font-weight:600; }
  .sliders{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{ display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line); border-radius:999px; padding:6px 12px; }
  .chip label{ font-size:11px; font-weight:700; color:var(--muted); min-width:74px; }
  .chip input{ width:90px; accent-color:var(--accent); }
  .chip .v{ font-size:11px; font-weight:800; min-width:20px; text-align:right; }
  .defbtn{ border:1px solid var(--line); background:#fff; border-radius:999px; padding:6px 14px; font:inherit; font-size:12px; font-weight:700; color:var(--accent); cursor:pointer; }
  .topsel{ border:1px solid var(--line); background:#fff; border-radius:999px; padding:6px 12px; font:inherit; font-size:12px; font-weight:700; color:var(--ink); cursor:pointer; outline:none; }
  .defbtn:hover{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .stage{ flex:1; min-height:0; display:flex; gap:10px; }
  #map{ flex:1; min-height:0; border:1px solid var(--line); border-radius:16px; background:#eef3f6; }
  .panel{ width:300px; flex:0 0 300px; border:1px solid var(--line); border-radius:16px; padding:14px; overflow:auto; background:#fff; }
  .panel.empty{ display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; text-align:center; }
  .panel h3{ margin:0 0 1px; font-size:17px; font-weight:800; }
  .panel .loc{ color:var(--muted); font-size:12px; margin-bottom:10px; }
  .comp{ display:flex; align-items:baseline; gap:6px; margin-bottom:12px; }
  .comp .big{ font-size:40px; font-weight:800; line-height:1; }
  .comp .den{ color:var(--muted); font-weight:700; }
  .comp .delta{ color:var(--good); font-weight:800; font-size:14px; margin-left:6px; }
  .bars{ display:flex; flex-direction:column; gap:7px; margin-bottom:12px; }
  .bar{ font-size:12px; }
  .bar .top{ display:flex; justify-content:space-between; margin-bottom:3px; }
  .bar .top .lbl{ color:var(--muted); font-weight:600; }
  .bar .top .num{ font-weight:800; }
  .bar .track{ height:7px; background:var(--line); border-radius:4px; overflow:hidden; }
  .bar .track i{ display:block; height:100%; border-radius:4px; }
  .mixlab{ font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin-bottom:4px; }
  .gentab{ width:100%; border-collapse:collapse; font-size:12px; margin-bottom:12px; }
  .gentab th{ font-size:10px; font-weight:700; color:var(--muted); text-align:right; padding:2px 4px; }
  .gentab th:first-child{ text-align:left; }
  .gentab td{ text-align:right; padding:3px 4px; font-variant-numeric:tabular-nums; font-weight:700; border-top:1px solid var(--line); }
  .gentab td.src{ text-align:left; text-transform:capitalize; color:var(--ink); font-weight:700; }
  .gentab td.src i{ width:9px; height:9px; border-radius:2px; display:inline-block; margin-right:6px; }
  .mix{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .mix .leg{ font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:3px; }
  .mix .leg b{ color:var(--ink); }
  .cbadge{ display:inline-block; font-size:12px; font-weight:800; padding:4px 10px; border-radius:999px; margin-bottom:12px; }
  .acts{ display:flex; gap:6px; margin-bottom:12px; }
  .emx,.sup{ flex:1; text-align:center; font-weight:800; font-size:12px; padding:8px 6px; border-radius:999px; text-decoration:none; }
  .emx{ background:var(--accent); color:#fff; }
  .sup{ background:#fff; color:var(--accent); border:1px solid var(--accent); }
  .emx:hover{ filter:brightness(0.95); } .sup:hover{ background:#fff4ee; }
  .boosts{ border-top:1px solid var(--line); padding-top:10px; }
  .boosts .t{ font-size:12px; font-weight:800; margin-bottom:8px; }
  .toggle{ display:flex; align-items:center; justify-content:space-between; font-size:13px; padding:6px 0; }
  .wire{ border-top:1px solid var(--line); margin-top:12px; padding-top:10px; }
  .wire .wt{ font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:8px; }
  .wrow{ display:flex; justify-content:space-between; align-items:baseline; font-size:12px; padding:3px 0; font-variant-numeric:tabular-nums; }
  .wrow .wk{ color:var(--ink); text-transform:capitalize; }
  .wrow .wm{ color:var(--muted); flex:1; text-align:right; padding-right:12px; }
  .wrow .wc{ color:var(--ink); font-weight:700; min-width:34px; text-align:right; }
  .wrow.wtot{ border-top:1px solid var(--line); margin-top:4px; padding-top:6px; font-weight:800; }
  .toggle .sw{ width:38px; height:22px; border-radius:999px; background:var(--line); position:relative; cursor:pointer; transition:.15s; flex:0 0 auto; }
  .toggle .sw.on{ background:var(--accent); }
  .toggle .sw::after{ content:""; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.15s; }
  .toggle .sw.on::after{ left:18px; }
  .toggle .d{ color:var(--good); font-weight:800; margin-right:8px; }
  .legend-box{ background:#fff; padding:8px 10px; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.15); font-size:12px; color:var(--muted); }
  .legend-box .scale{ width:110px; height:9px; border-radius:5px; margin:4px 0; background:linear-gradient(90deg,#E24B4A,#EF9F27,#639922); }
  .pin{ width:16px; height:16px; border-radius:50% 50% 50% 0; background:var(--accent); border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.35); transform:rotate(-45deg); margin-left:-8px; margin-top:-8px; }
  .pin-wrap{ background:none; border:0; }
  .solar-pin{ background:none; border:0; }
  .solar-pin .sp{ width:26px; height:26px; border-radius:50%; background:#EF9F27; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.4); }
  .rlab{ background:none!important; border:0!important; }
  .rlab span{ font-size:11px; font-weight:800; color:#1b1b1b; text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 3px #fff; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="logo" href="start.html" style="text-decoration:none;color:inherit"><svg viewBox="0 0 32 32" fill="none"><path d="M6 10l6-4 6 4-6 4-6-4z" fill="#E0703C"/><path d="M14 18l6-4 6 4-6 4-6-4z" fill="#222"/></svg>
      SiteScore <span class="sub">· micro-DC siting · Bavaria + Austria · per postal code</span></a>
    <div class="spacer"></div>
    <a class="btn" href="start.html">⌂ Home</a>
    <span class="badge" id="badge">DEMO DATA</span>
    <label class="btn" for="dataFile">Load GeoJSON</label>
    <input type="file" id="dataFile" accept=".json,.geojson,application/geo+json,application/json">
    <a class="link" id="tmpl">download template</a>
  </header>
  <div class="controls">
    <div class="caps" id="caps">
      <button class="cap" data-cap="edge">Edge <small>1–5kW</small></button>
      <button class="cap" data-cap="micro">Micro <small>6–10kW</small></button>
      <button class="cap on" data-cap="container">Container <small>10–50kW</small></button>
      <button class="cap" data-cap="small">Small <small>50–250kW</small></button>
      <button class="cap" data-cap="campus">Campus <small>250kW+</small></button>
    </div>
    <div class="search">
      <input id="plz" type="text" inputmode="numeric" maxlength="5" placeholder="Postal code, e.g. 80331">
      <span class="res" id="plzres"></span>
    </div>
  </div>
  <div class="sliders" id="sliders">
    <div class="chip"><label>Grid headroom</label><input type="range" id="w_grid" min="0" max="100" value="30"><span class="v" id="w_grid_v">30</span></div>
    <div class="chip"><label>Price</label><input type="range" id="w_price" min="0" max="100" value="25"><span class="v" id="w_price_v">25</span></div>
    <div class="chip"><label>Carbon</label><input type="range" id="w_carbon" min="0" max="100" value="20"><span class="v" id="w_carbon_v">20</span></div>
    <div class="chip"><label>Flexibility</label><input type="range" id="w_flex" min="0" max="100" value="15"><span class="v" id="w_flex_v">15</span></div>
    <div class="chip"><label>Heat reuse</label><input type="range" id="w_heat" min="0" max="100" value="10"><span class="v" id="w_heat_v">10</span></div>
    <div class="chip"><label>Clean energy</label><input type="range" id="w_clean" min="0" max="100" value="12"><span class="v" id="w_clean_v">12</span></div>
    <div class="chip"><label>Batch / shiftable</label><input type="range" id="shift" min="0" max="100" value="50"><span class="v" id="shift_v">50</span></div>
    <button id="defaults" class="defbtn" title="set all six sliders to 50">Default</button>
    <select id="topsel" class="topsel" title="outline the best-scoring postal codes">
      <option value="0">Highlight: off</option>
      <option value="c1">Top 1</option>
      <option value="c5">Top 5</option>
      <option value="c10" selected>Top 10</option>
    </select>
    <button id="jumptop" class="defbtn" title="fly to the best-scoring postal code">↑ Best site</button>
    <button id="solarbtn" class="defbtn" title="best 3 rooftop-solar buildings in the selected postal code">☀ Solar roofs</button>
  </div>
  <div class="stage">
    <div id="map"></div>
    <div class="panel empty" id="panel">Click a postal-code tile, or search a code, to see its SiteScore.</div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  // wiring check: weight x value = contribution, summing to the composite. proves the pipeline end-to-end.
  var wire=IDS.map(function(k,i){ var v=p.sub[k];
    return '<div class="wrow"><span class="wk">'+k+'</span><span class="wm">'+W[i].toFixed(2)+' × '+v+'</span><span class="wc">'+(W[i]*v).toFixed(1)+'</span></div>'; }).join('');
  var pn=document.getElementById('panel'); pn.className='panel';
  pn.innerHTML='<h3>'+(p.name||p.plz||'Node')+'</h3>'+
    '<div class="loc">'+(p.plz?('PLZ '+p.plz):'candidate site')+'</div>'+
    '<div class="comp"><span class="big" style="color:'+rc(shown)+'">'+shown+'</span><span class="den">/100</span>'+(delta>0?'<span class="delta">+'+delta+'</span>':'')+'</div>'+
    (p.plz?'<div class="acts"><a class="emx" href="earnmax.html?plz='+p.plz+'&kw='+activeKw()+'">Open EarnMax →</a><a class="sup" href="supply.html?plz='+p.plz+'&kw='+activeKw()+'&cap='+activeCap()+'">Plan supply →</a></div>':'')+
    '<div class="bars">'+bars+'</div>'+
    (function(){var lg=p.local_gen||{}; var col={wind:'#3b82c4',solar:'#EF9F27',hydro:'#2f9e9e',other:'#9aa0a6'};
      function yr(m){ return m>=1000?(Math.round(m/1000)+' GWh'):(Math.round(m)+' MWh'); }
      var rows=['wind','solar','hydro','other'].map(function(k){ var g=lg[k]||{count:0,mw:0,mwh:0};
        return '<tr><td class="src"><i style="background:'+col[k]+'"></i>'+k+'</td><td>'+g.count+'</td><td>'+g.mw+'</td><td>'+yr(g.mwh)+'</td></tr>'; }).join('');
      return '<div class="mixlab">local generation within 4 km</div><table class="gentab"><thead><tr><th></th><th>plants</th><th>MW</th><th>est./yr</th></tr></thead><tbody>'+rows+'</tbody></table>';})()+
    '<div class="cbadge" style="color:'+bandColor+';background:'+bandBg+'">carbon '+p.carbon_band+' \u00B7 '+p.carbon_g_kwh+' g/kWh \u00B7 \u20AC'+p.price_eur_mwh+'/MWh</div>'+
    '<div class="boosts"><div class="t">Boost this site</div>'+
      '<div class="toggle"><span>+20 kWh battery</span><span style="display:flex;align-items:center"><span class="d">+'+p.boost.battery_20kwh+'</span><span class="sw'+(boostState.battery?' on':'')+'" id="sw_b"></span></span></div>'+
      '<div class="toggle"><span>Resize node</span><span style="display:flex;align-items:center"><span class="d">+'+p.boost.resize+'</span><span class="sw'+(boostState.resize?' on':'')+'" id="sw_r"></span></span></div></div>'+
    '<div class="wire"><div class="wt">wiring check · weight × value</div>'+wire+
      '<div class="wrow wtot"><span class="wk">composite</span><span class="wm"></span><span class="wc">'+base+'</span></div></div>';
  document.getElementById('sw_b').onclick=function(){ boostState.battery=!boostState.battery; applyBoostColor(); renderPanel(); };
  document.getElementById('sw_r').onclick=function(){ boostState.resize=!boostState.resize; applyBoostColor(); renderPanel(); };
}
function applyBoostColor(){ if(!selected) return; var W=weights(); var base=composite(selected,W);
  var delta=(boostState.battery?selected.boost.battery_20kwh:0)+(boostState.resize?selected.boost.resize:0);
  selected._poly.setStyle({fillColor:rc(Math.min(100,base+delta))}); }
function selectNode(p){ selected=p; boostState={battery:false,resize:false}; refresh(); }

// grid headroom is capacity-aware: swap each node's grid subscore to match the chosen class.
function applyCapGrid(cap){
  FEATS.forEach(function(p){ if(p.grid_by_cap && p.grid_by_cap[cap]!=null) p.sub.grid=p.grid_by_cap[cap]; });
}
document.getElementById('caps').addEventListener('click',function(e){
  var b=e.target.closest('.cap'); if(!b) return;
  document.querySelectorAll('.cap').forEach(function(x){x.classList.remove('on');}); b.classList.add('on');
  var w=CAPS[b.dataset.cap], ids=['w_grid','w_price','w_carbon','w_flex','w_heat','w_clean'];
  ids.forEach(function(id,i){ document.getElementById(id).value=w[i]; document.getElementById(id+'_v').textContent=w[i]; });
  applyCapGrid(b.dataset.cap);
  refresh();
});
['w_grid','w_price','w_carbon','w_flex','w_heat','w_clean','shift'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(e){ document.getElementById(id+'_v').textContent=e.target.value; refresh(); });
  // on release, re-pull scores from the backend so the map reflects live data (and ramp mode ticks up)
  document.getElementById(id).addEventListener('change',refetchScores); });

// "Default" button: set all six sliders to 50 (flat, neutral baseline). no preset matches, so clear the cap selection.
document.getElementById('defaults').addEventListener('click',function(){
  ['w_grid','w_price','w_carbon','w_flex','w_heat','w_clean','shift'].forEach(function(id){
    document.getElementById(id).value=50; document.getElementById(id+'_v').textContent=50; });
  document.querySelectorAll('.cap').forEach(function(x){x.classList.remove('on');});
  refresh();
});
// outline the best-scoring postal codes (top N or top %)
document.getElementById('topsel').addEventListener('change',function(e){ TOP=e.target.value; refresh(); });
// jump to the single best-scoring postal code under the current weights
document.getElementById('jumptop').addEventListener('click',function(){
  if(!FEATS.length) return;
  var W=weights(), best=null, bs=-1;
  FEATS.forEach(function(p){ var s=composite(p,W); if(s>bs){ bs=s; best=p; } });
  if(best){ document.getElementById('plz').value=best.plz; searchPLZ(); }
});
// best 3 rooftop-solar buildings in the selected postal code (Google Solar API via the backend)
var solarLayer=null;
document.getElementById('solarbtn').addEventListener('click',function(){
  var plz = selected ? selected.plz : (document.getElementById('plz').value||'').trim();
  var res=document.getElementById('plzres');
  if(!/^[0-9]{4,5}$/.test(plz)){ res.textContent='select a postal code first'; return; }
  var btn=this; btn.textContent='☀ …';
  fetch(BACKEND+'/solar-sites/'+plz+'?n=3')
    .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw j; return j; }); })
    .then(function(j){
      btn.textContent='☀ Solar roofs';
      if(searchPin){ map.removeLayer(searchPin); searchPin=null; }   // drop the postal-code search pin
      if(solarLayer) map.removeLayer(solarLayer);
      solarLayer=L.layerGroup().addTo(map);
      if(!j.sites || !j.sites.length){ res.textContent='no solar-rated buildings found'; return; }
      var pts=[];
      j.sites.forEach(function(s,i){
        L.marker([s.lat,s.lng],{icon:L.divIcon({className:'solar-pin',iconSize:[26,26],html:'<div class="sp">'+(i+1)+'</div>'}),zIndexOffset:2000}).addTo(solarLayer)
          .bindPopup('<b>#'+(i+1)+' '+s.label+'</b><br>solar score '+s.score+(s.annual_kwh?'<br>'+Math.round(s.annual_kwh).toLocaleString()+' kWh/yr':'')+(s.panels?' · '+s.panels+' panels':''));
        pts.push([s.lat,s.lng]);
      });
      map.fitBounds(pts,{padding:[80,80],maxZoom:17});
      res.textContent='top '+j.sites.length+' solar roofs ☀';
    })
    .catch(function(e){ btn.textContent='☀ Solar roofs'; res.textContent=(e&&e.detail)?e.detail:'solar lookup failed'; });
});

// pull fresh subscores from the backend and update tiles in place (keeps current zoom + selection)
function refetchScores(){
  fetch(BACKEND + '/nodes')
    .then(function(r){ if(!r.ok) throw new Error('bad status'); return r.json(); })
    .then(function(fc){
      if(!fc.features || !fc.features.length) return;
      fc.features.forEach(function(f){ var pl=f.properties.plz, t=INDEX[pl]; if(t && f.properties.sub) t.sub=f.properties.sub; });
      computeClean();   // re-derive the clean subscore (backend sub doesn't carry it)
      refresh();
    })
    .catch(function(){});
}

// reset the weight sliders to the active capacity preset on load — guards against the browser
// restoring stale slider values across reloads (which would silently skew the weights).
(function(){
  var on=document.querySelector('.cap.on'); if(!on) return;
  var w=CAPS[on.dataset.cap], ids=['w_grid','w_price','w_carbon','w_flex','w_heat','w_clean'];
  ids.forEach(function(id,i){ document.getElementById(id).value=w[i]; document.getElementById(id+'_v').textContent=w[i]; });
  var sh=document.getElementById('shift'); sh.value=sh.getAttribute('value')||50; document.getElementById('shift_v').textContent=sh.value;
})();

function searchPLZ(){
  var code=(document.getElementById('plz').value||'').trim();
  var res=document.getElementById('plzres');
  if(!/^[0-9]{4,5}$/.test(code)){ res.textContent='4-5 digit code'; return; }
  var node=INDEX[code];
  if(node){ map.flyTo([node.centroid[1],node.centroid[0]],11,{duration:0.7}); res.textContent=code+' \u2713'; selectNode(node);
    if(searchPin){ map.removeLayer(searchPin); searchPin=null; }   // the selected tile is highlighted; no pin needed
    return; }
  var ll=PLZ_GEO[code];
  if(ll){ map.flyTo(ll,11,{duration:0.7}); res.textContent=code+' (no tile)';
    if(searchPin) map.removeLayer(searchPin);
    searchPin=L.marker(ll,{icon:L.divIcon({className:'pin-wrap',iconSize:[0,0],html:'<div class="pin"></div>'}),zIndexOffset:1000}).addTo(map); }
  else res.textContent=code+' not found';
}
document.getElementById('plz').addEventListener('keydown',function(e){ if(e.key==='Enter') searchPLZ(); });

document.getElementById('dataFile').addEventListener('change',function(e){
  var f=e.target.files[0]; if(!f) return; var rd=new FileReader();
  rd.onload=function(){ try{
    var fc=JSON.parse(rd.result);
    if(!fc.features||!fc.features.length) throw new Error('not a FeatureCollection');
    if(!(fc.features[0].properties&&fc.features[0].properties.sub)) throw new Error('each feature needs properties.sub {grid,price,carbon,flex,heat}');
    setData(fc); selected=null;
    var pn=document.getElementById('panel'); pn.className='panel empty'; pn.textContent='Click a tile, or search a code, to see its SiteScore.';
    build(); refresh();
    var bd=document.getElementById('badge'); bd.textContent='LIVE DATA'; bd.style.background='#eaf6ec'; bd.style.color='#3b7d2f'; bd.style.borderColor='#cfe7cd';
  }catch(err){ alert('Could not load GeoJSON: '+err.message); } };
  rd.readAsText(f);
});
// pull the demo set on demand (it's no longer inlined — lives in demo.geojson)
function loadDemo(){
  if(DEMO) return Promise.resolve(DEMO);
  return fetch('demo.geojson').then(function(r){ if(!r.ok) throw new Error('no demo'); return r.json(); }).then(function(fc){ DEMO=fc; return fc; });
}
document.getElementById('tmpl').addEventListener('click',function(){
  loadDemo().then(function(fc){
    var blob=new Blob([JSON.stringify(fc)],{type:'application/geo+json'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='nodes.template.geojson'; a.click();
  });
});

// boot: try the backend first, fall back to demo.geojson if it's not running
var BACKEND = 'http://localhost:8000';
function boot(fc, live){
  setData(fc);
  var on=document.querySelector('.cap.on'); if(on) applyCapGrid(on.dataset.cap);
  build(); refresh();
  setTimeout(function(){ map.invalidateSize(); }, 150);
  var bd=document.getElementById('badge');
  if(live){ bd.textContent='LIVE \u00B7 backend'; bd.style.background='#eaf6ec'; bd.style.color='#3b7d2f'; bd.style.borderColor='#cfe7cd'; }
  else { bd.textContent='DEMO DATA'; }
  // arriving from the supply planner: pre-select capacity, tilt the weights by goal + supply mix, fly to site
  var u=new URLSearchParams(location.search);
  if(u.get('cap')){ var cb=document.querySelector('.cap[data-cap="'+u.get('cap')+'"]'); if(cb) cb.click(); }
  if(u.get('opt')){
    var mix=(u.get('grid')!=null)?{grid:+u.get('grid'),ppa:+u.get('ppa'),onsite:+u.get('onsite')}:null;
    applyPlan(u.get('opt'), mix); refresh();
  }
  if(u.get('plz')){ document.getElementById('plz').value=u.get('plz'); searchPLZ(); }
}
// shape the 6 weights from the landing goal (green/price/both) and the supply mix, then write the sliders
function applyPlan(opt, mix){
  var green=opt.indexOf('green')>=0, price=opt.indexOf('price')>=0;
  var ids=['w_grid','w_price','w_carbon','w_flex','w_heat','w_clean'], w=ids.map(function(id){return gv(id);});
  if(green && !price){ w[2]*=1.6; w[5]*=1.8; w[1]*=0.6; }          // green: carbon + clean up, price down
  else if(price && !green){ w[1]*=1.8; w[2]*=0.7; w[5]*=0.7; }     // price: price up, carbon/clean down
  if(mix){ var g=mix.grid/100, pp=mix.ppa/100, o=mix.onsite/100;
    w[0]*=(1+g*0.8); w[1]*=(1+g*0.5); w[2]*=(1+pp*0.7); w[5]*=(1+(pp+o)*1.0); }  // grid->headroom/price, ppa/on-site->carbon/clean
  var s=w.reduce(function(a,b){return a+b;},0)||1;
  ids.forEach(function(id,i){ var v=Math.round(w[i]/s*100); document.getElementById(id).value=v; document.getElementById(id+'_v').textContent=v; });
}
fetch(BACKEND + '/nodes')
  .then(function(r){ if(!r.ok) throw new Error('bad status'); return r.json(); })
  .then(function(fc){ if(!fc.features || !fc.features.length || !(fc.features[0].properties && fc.features[0].properties.sub)) throw new Error('bad shape'); boot(fc, true); })
  .catch(function(){ loadDemo().then(function(fc){ boot(fc, false); }).catch(function(){ var bd=document.getElementById('badge'); bd.textContent='NO DATA'; }); });
window.addEventListener('resize',function(){ map.invalidateSize(); });
window.addEventListener('pageshow',function(e){ if(e.persisted) location.reload(); });   // clean state on back
</script>
