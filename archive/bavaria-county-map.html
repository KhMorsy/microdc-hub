<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bavaria · data-center siting</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#E0703C; --bg:#ffffff; --surface:#ffffff; --surface2:#f3f3f3; --ink:#222222; --muted:#717171; --line:#EBEBEB; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#fff; color:var(--ink);
    font-family:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .wrap{ max-width:1280px; height:100vh; margin:0 auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
  header{ display:flex; align-items:center; gap:12px; margin:0; flex-wrap:wrap; }
  .logo{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:18px; }
  .logo svg{ width:24px; height:24px; }
  header .sub{ color:var(--muted); font-size:13px; font-weight:600; }
  header .spacer{ flex:1; }
  .mode{ display:flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; background:var(--surface); }
  .mode button{ border:0; background:var(--surface); padding:7px 14px; font:inherit; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; }
  .mode button.on{ background:var(--ink); color:#fff; }

  .databar{ display:flex; align-items:center; gap:10px; margin:0; font-size:12px; color:var(--muted); flex-wrap:wrap; }
  .badge{ background:#fff4ee; color:var(--accent); font-weight:800; padding:4px 10px; border-radius:999px; border:1px solid #f3d9cc; }
  .databar label.btn{ background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:6px 12px; font-weight:700; color:var(--ink); cursor:pointer; }
  .databar label.btn:hover{ background:var(--surface2); }
  .databar a{ color:var(--accent); font-weight:700; cursor:pointer; }
  #dataFile{ display:none; }

  .filters{ display:flex; gap:10px; flex-wrap:wrap; margin:0; }
  .chip{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--line);
    border-radius:999px; padding:8px 14px; flex:1; min-width:180px; }
  .chip label{ font-size:12px; font-weight:700; color:var(--muted); min-width:64px; }
  .chip input{ flex:1; accent-color:var(--accent); }
  .chip .v{ font-size:12px; font-weight:800; min-width:28px; text-align:right; }

  #map{ flex:1; min-height:0; border:1px solid var(--line); border-radius:16px; background:#eef3f6; }
  .leaflet-container{ font-family:"Manrope",sans-serif; }
  .legend-box{ background:#fff; padding:8px 10px; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.15); font-size:12px; color:var(--muted); }
  .legend-box .scale{ width:120px; height:9px; border-radius:5px; margin:4px 0; background:linear-gradient(90deg,#E24B4A,#EF9F27,#639922); }

  .pill-wrap{ background:none; border:0; }
  #map.zin .pill{ display:none; }
  .rlab{ background:none!important; border:0!important; }
  .rlab span{ font-size:11px; font-weight:800; color:#1b1b1b; text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 3px #fff; }
  .pill{ display:inline-flex; align-items:center; gap:5px; background:#fff; color:var(--ink);
    font-weight:800; font-size:12px; padding:5px 9px; border-radius:999px;
    box-shadow:0 1px 4px rgba(0,0,0,.22),0 0 0 1px rgba(0,0,0,.05); white-space:nowrap; cursor:pointer; transition:transform .08s; }
  .pill:hover{ transform:scale(1.12); box-shadow:0 3px 10px rgba(0,0,0,.3); z-index:700; }
  .pill .dot{ width:7px; height:7px; border-radius:50%; flex:0 0 auto; }

  .card h4{ margin:0 0 2px; font-size:15px; font-weight:800; }
  .card .loc{ color:var(--muted); font-size:12px; margin-bottom:8px; }
  .card .row{ display:flex; justify-content:space-between; font-size:13px; padding:3px 0; gap:18px; }
  .card .row span:first-child{ color:var(--muted); }
  .leaflet-popup-content-wrapper{ border-radius:14px; }
  .leaflet-popup-content{ margin:12px 14px; }

  .summary{ display:flex; gap:20px; flex-wrap:wrap; align-items:center; margin:0; }
  .stat .k{ font-size:12px; color:var(--muted); font-weight:700; }
  .stat .v{ font-size:18px; font-weight:800; }
  .summary .note{ margin-left:auto; max-width:380px; color:var(--muted); font-size:12px; }
  .search{ display:flex; gap:8px; align-items:center; margin:0; flex-wrap:wrap; }
  .search input{ font:inherit; font-size:14px; padding:9px 14px; border:1px solid var(--line);
    border-radius:999px; width:240px; outline:none; background:var(--surface); color:var(--ink); }
  .search input:focus{ border-color:var(--accent); }
  .search button{ font:inherit; font-weight:700; font-size:13px; padding:9px 16px; border:0;
    background:var(--ink); color:#fff; border-radius:999px; cursor:pointer; }
  .search button:hover{ background:#000; }
  .search .res{ font-size:13px; color:var(--muted); font-weight:600; }
  .pin{ width:16px; height:16px; border-radius:50% 50% 50% 0; background:var(--accent);
    border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.35); transform:rotate(-45deg);
    margin-left:-8px; margin-top:-8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none"><path d="M6 10l6-4 6 4-6 4-6-4z" fill="#E0703C"/><path d="M14 18l6-4 6 4-6 4-6-4z" fill="#222"/></svg>
      Invertix <span class="sub">· edge siting · Bavaria</span>
    </div>
    <div class="spacer"></div>
    <div class="mode" id="mode">
      <button data-k="1" class="on">best 1</button>
      <button data-k="3">best 3</button>
      <button data-k="5">best 5</button>
    </div>
  </header>

  <div class="databar">
    <span class="badge" id="badge">MOCK DATA</span>

    <label class="btn" for="dataFile">Load data (.json)</label>

    <a id="tmpl">download template</a>

  <div class="filters">
    <div class="chip"><label>Cost</label><input type="range" id="w_cost" min="0" max="100" value="55"><span class="v" id="w_cost_v">55</span></div>
    <div class="chip"><label>Carbon</label><input type="range" id="w_carbon" min="0" max="100" value="40"><span class="v" id="w_carbon_v">40</span></div>
    <div class="chip"><label>Grid room</label><input type="range" id="w_grid" min="0" max="100" value="45"><span class="v" id="w_grid_v">45</span></div>
    <div class="chip"><label>Near users</label><input type="range" id="w_users" min="0" max="100" value="60"><span class="v" id="w_users_v">60</span></div>
  </div>

  <div class="search">
    <input id="plz" type="text" inputmode="numeric" maxlength="5" placeholder="Enter a postal code, e.g. 80331">
    <button id="plzgo">Find on map</button>
    <span class="res" id="plzres"></span>
  </div>
  <div id="map"></div>

  <div class="summary">
    <div class="stat"><div class="k">Top region</div><div class="v" id="s_top">\u2014</div></div>
    <div class="stat"><div class="k">Rating</div><div class="v" id="s_price">\u2014</div></div>
    <div class="stat"><div class="k">Its carbon</div><div class="v" id="s_carbon">\u2014</div></div>
    <div class="note" id="s_note"></div>
  </div>
</div>

function setData(d){
  REGIONS=d.regions; CITIES=d.cities;
  var pr=REGIONS.map(function(r){return r.price;}).concat(CITIES.map(function(c){return c.price;}));
  var cr=REGIONS.map(function(r){return r.carbon;}).concat(CITIES.map(function(c){return c.carbon;}));
  minP=Math.min.apply(0,pr); maxP=Math.max.apply(0,pr);
  minC=Math.min.apply(0,cr); maxC=Math.max.apply(0,cr);
  minPop=Math.min.apply(0,REGIONS.map(function(r){return r.pop;}));
  maxPop=Math.max.apply(0,REGIONS.map(function(r){return r.pop;}));
}
function rc(v){v=Math.max(0,Math.min(100,v));function L(a,b,t){return Math.round(a+(b-a)*t);}
  if(v<50){var t=v/50;return"rgb("+L(226,239,t)+","+L(75,159,t)+","+L(74,39,t)+")";}
  var u=(v-50)/50;return"rgb("+L(239,99,u)+","+L(159,153,u)+","+L(39,34,u)+")";}
function gv(id){return +document.getElementById(id).value;}
function weights(){var a=gv('w_cost'),b=gv('w_carbon'),c=gv('w_grid'),d=gv('w_users');var s=a+b+c+d||1;return[a/s,b/s,c/s,d/s];}
function rate(o,Wt,pmin,pmax){
  var ps=1-(o.price-minP)/((maxP-minP)||1);
  var cs=1-(o.carbon-minC)/((maxC-minC)||1);
  var gs=1-o.cong;
  var us=(o.pop-pmin)/((pmax-pmin)||1);
  return Math.round(100*(Wt[0]*ps+Wt[1]*cs+Wt[2]*gs+Wt[3]*us));
}

    var lbl=L.marker([r.cy,r.cx],{interactive:false,keyboard:false,
      icon:L.divIcon({className:'rlab',iconSize:[0,0],html:'<span></span>'})}).addTo(map);
    r._lbl=lbl; regionLabels.push(lbl);
    latlngs.forEach(function(ll){bounds.push(ll);});
  });
  CITIES.forEach(function(c){
    var m=L.marker([c.lat,c.lon],{icon:L.divIcon({className:'pill-wrap',iconSize:[0,0],html:''})}).addTo(map);
    m.bindPopup(cityCard(c)); c._m=m; cityMarkers.push(m);
  });
  map.fitBounds(bounds,{padding:[55,55],maxZoom:7});
}

function refresh(){
  var Wt=weights();
  REGIONS.forEach(function(r){r.rating=rate(r,Wt,minPop,maxPop);});
  var raws=REGIONS.map(function(r){return r.rating;});
  var minR=Math.min.apply(0,raws),maxR=Math.max.apply(0,raws);
  REGIONS.forEach(function(r){r.cval=Math.round((r.rating-minR)/((maxR-minR)||1)*100);});
  var ranked=REGIONS.slice().sort(function(a,b){return b.rating-a.rating;});
  var best={}; ranked.slice(0,K).forEach(function(r){best[r.name]=true;});
  REGIONS.forEach(function(r){
    r._poly.setStyle({fillColor:rc(r.cval),fillOpacity:best[r.name]?0.95:0.78,
      color:best[r.name]?'#222':'#ffffff',weight:best[r.name]?2.5:0.7});
    r._poly.setPopupContent(regionCard(r));
    r._lbl.setIcon(L.divIcon({className:'rlab',iconSize:[0,0],html:'<span>'+(r.rating/10).toFixed(1)+'</span>'}));
  });
  var cMin=Math.min.apply(0,CITIES.map(function(c){return c.pop;})),cMax=Math.max.apply(0,CITIES.map(function(c){return c.pop;}));
  CITIES.forEach(function(c){ c._m.setIcon(pillIcon(c,Wt,cMin,cMax)); });
  var top=ranked[0];
  document.getElementById('s_top').textContent=top.name;
  document.getElementById('s_price').textContent=(top.rating/10).toFixed(1)+' / 10';
  document.getElementById('s_carbon').textContent=top.carbon+' g/kWh';
  document.getElementById('s_note').textContent='Cheapest, cleanest power sits in rural Franconia and the Alps; users cluster around Munich. Raise "near users" and the pick pulls toward the metro.';
}

['w_cost','w_carbon','w_grid','w_users'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(e){ document.getElementById(id+'_v').textContent=e.target.value; refresh(); });
});
document.querySelectorAll('#mode button').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('#mode button').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on'); K=+b.dataset.k; refresh();
  });
});
document.getElementById('dataFile').addEventListener('change',function(e){
  var f=e.target.files[0]; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(){
    try{
      var d=JSON.parse(rd.result);
      if(!d.regions||!d.cities) throw new Error('JSON needs "regions" and "cities" arrays');
      setData(d); build(); refresh();
      var bd=document.getElementById('badge'); bd.textContent='LIVE DATA';
      bd.style.background='#eaf6ec'; bd.style.color='#3b7d2f'; bd.style.borderColor='#cfe7cd';
    }catch(err){ alert('Could not load data: '+err.message); }
  };
  rd.readAsText(f);
});
document.getElementById('tmpl').addEventListener('click',function(){
  var blob=new Blob([JSON.stringify(MOCK_DATA,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='siting-data-template.json'; a.click();
});


function pointInRing(lon,lat,ring){
  var inside=false;
  for(var i=0,j=ring.length-1;i<ring.length;j=i++){
    var xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    var hit=((yi>lat)!=(yj>lat))&&(lon<(xj-xi)*(lat-yi)/((yj-yi)||1e-9)+xi);
    if(hit) inside=!inside;
  }
  return inside;
}
function findCounty(lat,lon){
  for(var i=0;i<REGIONS.length;i++){ if(pointInRing(lon,lat,REGIONS[i].ring)) return REGIONS[i]; }
  return null;
}
function searchPLZ(){
  var code=(document.getElementById('plz').value||'').trim();
  var res=document.getElementById('plzres');
  if(!/^[0-9]{5}$/.test(code)){ res.textContent='Enter a 5-digit postal code.'; return; }
  var ll=PLZ_GEO[code];
  if(!ll){ res.textContent='Postal code '+code+' is not in the Bavaria dataset.'; return; }
  map.flyTo(ll,11,{duration:0.8});
  if(searchPin) map.removeLayer(searchPin);
  searchPin=L.marker(ll,{icon:L.divIcon({className:'pill-wrap',iconSize:[0,0],html:'<div class="pin"></div>'}),zIndexOffset:1000}).addTo(map);
  var co=findCounty(ll[0],ll[1]);
  if(co){
    res.textContent=code+' \u2192 '+co.name+' \u00B7 rating '+(co.rating/10).toFixed(1)+'/10';
    searchPin.bindPopup('<div class="card"><h4>'+code+'</h4><div class="loc">'+co.name+'</div>'+
      '<div class="row"><span>Rating</span><span>'+(co.rating/10).toFixed(1)+' / 10</span></div>'+
      '<div class="row"><span>Electricity price</span><span>\u20AC'+co.price+'/MWh</span></div>'+
      '<div class="row"><span>Carbon intensity</span><span>'+co.carbon+' g/kWh</span></div>'+
      '<div class="row"><span>Grid congestion</span><span>'+Math.round(co.cong*100)+'%</span></div></div>').openPopup();
  } else {
    res.textContent=code+' \u2192 located, but outside the Bavaria county layer.';
    searchPin.bindPopup('<b>'+code+'</b>').openPopup();
  }
}
document.getElementById('plzgo').addEventListener('click',searchPLZ);
document.getElementById('plz').addEventListener('keydown',function(e){ if(e.key==='Enter') searchPLZ(); });

setData(MOCK_DATA); build(); refresh();
function updateZoomVis(){ map.getContainer().classList.toggle('zin', map.getZoom()>8); }
map.on('zoomend', updateZoomVis); updateZoomVis();
setTimeout(function(){ map.invalidateSize(); updateZoomVis(); },150);
window.addEventListener('resize',function(){ map.invalidateSize(); });
</script>
